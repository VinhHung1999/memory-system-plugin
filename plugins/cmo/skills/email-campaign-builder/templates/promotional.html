<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{subject}}</title>
</head>
<body style="margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:#f6f6f6;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
  <tr><td align="center" style="padding:24px;">
    <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="max-width:600px; background:#fff; border-radius:8px; overflow:hidden;">
      <tr><td style="background:{{hero_color}}; padding:40px 24px; text-align:center;">
        <h1 style="margin:0 0 12px; font-size:32px; color:#fff;">{{hero_headline}}</h1>
        <p style="margin:0; font-size:18px; color:#fff;">{{hero_subheadline}}</p>
      </td></tr>
      <tr><td style="padding:32px 40px;">
        <p style="margin:0 0 16px; font-size:16px; line-height:1.5; color:#444;">Hi {{first_name}},</p>
        <p style="margin:0 0 24px; font-size:16px; line-height:1.5; color:#444;">
          {{offer_detail}} — but only until <strong>{{deadline}}</strong>.
        </p>
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 auto 24px;">
          <tr><td style="background:{{cta_color}}; border-radius:6px;"><a href="{{cta_url}}" style="display:inline-block; padding:14px 32px; color:#fff; text-decoration:none; font-weight:600; font-size:16px;">{{cta_text}}</a></td></tr>
        </table>
        <h3 style="margin:24px 0 12px; font-size:16px; color:#111;">Why {{customers_count}}+ customers love {{product_name}}</h3>
        <p style="margin:0 0 24px; font-size:14px; color:#666; line-height:1.5;">
          "{{testimonial}}" — {{testimonial_author}}
        </p>
        <hr style="border:none; border-top:1px solid #eee; margin:24px 0;">
        <p style="margin:0; font-size:12px; color:#999;">
          {{brand_name}} · {{physical_address}}<br>
          <a href="{{preferences_url}}" style="color:#999;">Preferences</a> ·
          <a href="{{unsubscribe_url}}" style="color:#999;">Unsubscribe</a>
        </p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
