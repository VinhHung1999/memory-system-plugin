<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{subject}}</title>
</head>
<body style="margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:#f6f6f6;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
  <tr><td align="center" style="padding:24px;">
    <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="max-width:600px; background:#fff; border-radius:8px; overflow:hidden;">
      <tr><td style="padding:40px 40px 24px;">
        <h1 style="margin:0 0 16px; font-size:24px; color:#111;">{{first_name}}, {{headline_hook}}</h1>
        <p style="margin:0 0 16px; font-size:16px; line-height:1.6; color:#444;">
          {{empathy_statement}}
        </p>
        <p style="margin:0 0 24px; font-size:16px; line-height:1.6; color:#444;">
          {{reminder_of_value}}
        </p>
        <div style="background:#fff8e1; border-left:4px solid #f9a825; padding:16px 20px; margin:0 0 24px;">
          <p style="margin:0; font-size:16px; line-height:1.5; color:#444;">
            <strong>{{incentive}}</strong> — {{incentive_detail}}
          </p>
        </div>
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 24px;">
          <tr><td style="background:#111; border-radius:6px;"><a href="{{cta_url}}" style="display:inline-block; padding:12px 24px; color:#fff; text-decoration:none; font-weight:600;">{{cta_text}}</a></td></tr>
        </table>
        <p style="margin:0 0 0; font-size:14px; color:#666;">
          Not interested? <a href="{{unsubscribe_url}}" style="color:#666;">No hard feelings — unsubscribe here.</a>
        </p>
        <hr style="border:none; border-top:1px solid #eee; margin:32px 0 16px;">
        <p style="margin:0; font-size:12px; color:#999;">
          {{brand_name}} · {{physical_address}}
        </p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
